<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Hola, este mi primer Proyecto</h1>
  <h2>Bienvenidos ADSO</h2>

  <H2>{{ Bienvenidos }}</H2>

  <ul>
    <li>Cuadernos</li>
    <li>Gorras</li>
    <li>Gafas</li>
  </ul>

  <h2>Antigua Sintaxis</h2>
  <ul>
    <li *ngFor="let objeto of Estudiantes">{{objeto}}</li>
  </ul>
  
  <br>
  <h2>Nueva Sintaxis</h2>
  <ul>
    @for (objeto of Estudiantes; track objeto){
      <li>{{objeto}}</li>
    }
  </ul>

</body>
</html>
